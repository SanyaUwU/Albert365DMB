<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram - Канал связи</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root {
    --bg-main: #0e1621;
    --bg-secondary: #17212b;
    --bg-input: #242f3d;
    --text-main: #ffffff;
    --text-muted: #7f91a4;
    --accent-color: #2b5278;
    --msg-in: #182533;
    --msg-out: #2b5278;
    --danger: #e53935;
}
body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background-color 0.3s, color 0.3s;
}
#auth-screen, #name-screen, #password-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
    background: var(--bg-main);
    transition: background-color 0.3s;
}
.auth-box {
    background: var(--bg-secondary);
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    max-width: 380px;
    width: 100%;
    text-align: center;
    transition: background-color 0.3s;
}
.auth-box h2 {
    margin-top: 0;
    font-size: 24px;
    margin-bottom: 20px;
}
.auth-box input {
    width: 100%;
    padding: 14px;
    margin: 15px 0;
    background: var(--bg-input);
    border: 1px solid transparent;
    color: var(--text-main);
    font-size: 16px;
    border-radius: 8px;
    box-sizing: border-box;
    transition: border 0.2s, background-color 0.3s;
}
.auth-box input:focus {
    outline: none;
    border: 1px solid var(--accent-color);
}
.btn {
    background: var(--accent-color);
    color: #fff;
    border: none;
    padding: 14px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
    width: 100%;
    transition: filter 0.2s, background-color 0.3s;
    font-weight: 600;
}
.btn:hover {
    filter: brightness(1.1);
}
.error {
    color: var(--danger);
    margin-top: 15px;
    display: none;
    font-size: 14px;
}
#app-layout {
    display: none;
    height: 100vh;
    width: 100vw;
    flex-direction: row;
}
.sidebar {
    width: 300px;
    background: var(--bg-secondary);
    border-right: 1px solid rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    transition: background-color 0.3s;
}
.sidebar-header {
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-secondary);
    transition: background-color 0.3s;
    gap: 10px;
}
.menu-btn, .action-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    transition: color 0.2s;
}
.menu-btn:hover, .action-btn:hover {
    color: var(--text-main);
}
.chat-list {
    flex: 1;
    overflow-y: auto;
}
.chat-item {
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 15px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    cursor: pointer;
    transition: background-color 0.2s;
}
.chat-item:hover {
    background: rgba(255,255,255,0.05);
}
.avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
}
.chat-info {
    overflow: hidden;
}
.chat-info h4 {
    margin: 0 0 5px 0;
    font-size: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.chat-info p {
    margin: 0;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.main-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-main);
    position: relative;
    transition: background-color 0.3s;
}
.chat-header {
    background: var(--bg-secondary);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    z-index: 10;
    transition: background-color 0.3s;
}
.chat-header-left {
    display: flex;
    align-items: center;
}
.back-to-chats-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-main);
    font-size: 24px;
    cursor: pointer;
    margin-right: 15px;
    padding: 0;
}
.chat-header-info h3 {
    margin: 0;
    font-size: 18px;
}
.chat-header-info p {
    margin: 2px 0 0 0;
    font-size: 13px;
    color: var(--text-muted);
}
.header-actions {
    display: flex;
    gap: 15px;
}
.icon-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 8px;
    border-radius: 50%;
    transition: background 0.2s, color 0.3s;
}
.icon-btn:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text-main);
}
.admin-btn {
    display: none;
    color: var(--danger);
}
.admin-btn:hover {
    background: rgba(229, 57, 53, 0.1);
    color: #ff5252;
}
#noChatSelected {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 16px;
}
#chatContent {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
}
#messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.message-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 65%;
    position: relative;
}
.message-wrapper.out {
    align-self: flex-end;
}
.message-wrapper.in {
    align-self: flex-start;
}
.message-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    word-wrap: break-word;
    position: relative;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    transition: background-color 0.3s;
}
.message-wrapper.in .message-bubble {
    background: var(--msg-in);
    border-bottom-left-radius: 4px;
}
.message-wrapper.out .message-bubble {
    background: var(--msg-out);
    border-bottom-right-radius: 4px;
}
.message-meta {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 5px;
    margin-top: 4px;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
}
.message-sender {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #ffffff;
    opacity: 0.8;
}
.input-area {
    padding: 15px 20px;
    background: var(--bg-main);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    transition: background-color 0.3s;
}
.input-wrapper {
    flex: 1;
    background: var(--bg-secondary);
    border-radius: 12px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    transition: background-color 0.3s;
}
.input-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-main);
    padding: 15px 10px;
    font-size: 16px;
}
.input-wrapper input:focus {
    outline: none;
}
.send-btn {
    background: var(--accent-color);
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: transform 0.1s, background-color 0.3s;
}
.send-btn:active {
    transform: scale(0.95);
}
.context-menu {
    position: fixed;
    background: var(--bg-secondary);
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    padding: 5px 0;
    z-index: 9999;
    display: none;
    min-width: 150px;
    transition: background-color 0.3s;
}
.context-menu-item {
    padding: 10px 15px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
}
.context-menu-item:hover {
    background: rgba(255,255,255,0.05);
}
.context-menu-item.danger {
    color: var(--danger);
}
#edit-bar {
    background: var(--bg-secondary);
    padding: 10px 20px;
    display: none;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(0,0,0,0.2);
    transition: background-color 0.3s;
}
.edit-info {
    display: flex;
    flex-direction: column;
}
.edit-title {
    color: var(--accent-color);
    font-size: 14px;
    font-weight: 600;
    transition: color 0.3s;
}
.edit-text {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
}
.close-edit {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 20px;
}
.settings-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
}
.settings-content {
    background: var(--bg-secondary);
    width: 350px;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: background-color 0.3s;
}
.settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.settings-header h3 {
    margin: 0;
}
.color-picker-wrapper {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.color-swatch {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s;
}
.color-swatch:hover {
    transform: scale(1.1);
}
.color-swatch.active {
    border-color: #ffffff;
}
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.2);
}
@media (max-width: 768px) {
    .sidebar {
        width: 100%;
        border-right: none;
    }
    .main-chat {
        display: none;
        width: 100%;
    }
    .sidebar.hidden {
        display: none !important;
    }
    .main-chat.active {
        display: flex !important;
    }
    .back-to-chats-btn {
        display: block;
    }
    .message-wrapper {
        max-width: 85%;
    }
}
</style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2>Наилучший канал связи</h2>
        <input type="text" id="secretInput" autocomplete="off" placeholder="Введите код доступа или логин...">
        <button class="btn" id="loginBtn">Войти</button>
        <div class="error" id="errorMsg">Код не найден.</div>
        <a href="index.html" style="display: block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 14px;">← На главную</a>
    </div>
</div>

<div id="password-screen" style="display:none;">
    <div class="auth-box">
        <h2>Проверка безопасности</h2>
        <input type="password" id="loginPasswordInput" autocomplete="off" placeholder="Введите ваш пароль...">
        <button class="btn" id="verifyPasswordBtn">Подтвердить</button>
        <div class="error" id="passErrorMsg">Неверный пароль.</div>
        <a href="javascript:location.reload()" style="display: block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 14px;">← Назад</a>
    </div>
</div>

<div id="name-screen" style="display:none;">
    <div class="auth-box">
        <h2>Регистрация</h2>
        <input type="text" id="nameInput" autocomplete="off" placeholder="Введите ваше имя...">
        <input type="password" id="newPasswordInput" autocomplete="off" placeholder="Придумайте пароль...">
        <button class="btn" id="saveNameBtn">Завершить</button>
    </div>
</div>

<div id="app-layout">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="menu-btn" id="openSettingsBtn" title="Настройки">☰</button>
            <div style="font-weight:bold; font-size:16px;" id="sidebarName">Пользователь</div>
            <button class="action-btn" id="addChatBtn" title="Найти по коду">➕</button>
            <button class="action-btn admin-btn" id="adminInviteBtn" style="display:none;" title="Создать код">🔑</button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main-chat" id="mainChat">
        <div id="noChatSelected">
            Выберите чат для начала общения
        </div>
        
        <div id="chatContent">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button class="back-to-chats-btn" id="backToChatsBtn">←</button>
                    <div class="chat-header-info">
                        <h3 id="chatTitle">...</h3>
                        <p>в сети</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn admin-btn" id="clearChatBtn" title="Очистить историю">🗑</button>
                    <button class="icon-btn" onclick="window.location.reload()" title="Выйти">🚪</button>
                </div>
            </div>
            
            <div id="messages-area"></div>
            
            <div id="edit-bar">
                <div class="edit-info">
                    <span class="edit-title">Редактирование сообщения</span>
                    <span class="edit-text" id="editPreview">...</span>
                </div>
                <button class="close-edit" id="cancelEditBtn">×</button>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="msgInput" placeholder="Написать сообщение..." autocomplete="off">
                </div>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>

        <div class="context-menu" id="contextMenu">
            <div class="context-menu-item" id="ctxEdit">✎ Редактировать</div>
            <div class="context-menu-item danger" id="ctxDelete">🗑 Удалить</div>
        </div>
    </div>
</div>

<div class="settings-modal" id="settingsModal">
    <div class="settings-content">
        <div class="settings-header">
            <h3>Тема интерфейса</h3>
            <button class="close-edit" id="closeSettingsBtn">×</button>
        </div>
        <p style="margin-top: 0; color: var(--text-muted); font-size: 14px;">Выберите цветовую схему:</p>
        <div class="color-picker-wrapper">
            <div class="color-swatch" style="background: #2b5278;" data-theme="blue"></div>
            <div class="color-swatch" style="background: #2a6f5e;" data-theme="green"></div>
            <div class="color-swatch" style="background: #7b2cbf;" data-theme="purple"></div>
            <div class="color-swatch" style="background: #b71c1c;" data-theme="red"></div>
            <div class="color-swatch" style="background: #d4a373;" data-theme="orange"></div>
            <div class="color-swatch" style="background: #333333;" data-theme="dark"></div>
        </div>
        <p style="margin-top: 10px; color: var(--text-muted); font-size: 12px;" id="myCodeDisplay"></p>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCj3xj5QaM-WtohkEuaswE1l3tGjgkxsf0",
  authDomain: "dmb-albert.firebaseapp.com",
  databaseURL: "https://dmb-albert-default-rtdb.firebaseio.com",
  projectId: "dmb-albert",
  storageBucket: "dmb-albert.firebasestorage.app",
  messagingSenderId: "670419254169",
  appId: "1:670419254169:web:c7dc1b3a322a409d7db108",
  measurementId: "G-H9FVBXKNX4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUserCode = "";
let currentUserName = "";
let isAdmin = false;
let currentChatId = null;
let editingMessageId = null;
let selectedMessageId = null;
let selectedMessageElement = null;
let tempInviteCode = "";
let tempLoginCode = "";
let expectedPassword = "";
let expectedName = "";

const themes = {
    blue: { main: '#0e1621', sec: '#17212b', inp: '#242f3d', acc: '#2b5278', mIn: '#182533', mOut: '#2b5278' },
    green: { main: '#0f1a15', sec: '#15241d', inp: '#1c3026', acc: '#2a6f5e', mIn: '#162b22', mOut: '#2a6f5e' },
    purple: { main: '#140f1a', sec: '#1c1524', inp: '#261c30', acc: '#7b2cbf', mIn: '#20162b', mOut: '#5a189a' },
    red: { main: '#1a0f0f', sec: '#241515', inp: '#301c1c', acc: '#b71c1c', mIn: '#2b1616', mOut: '#9c1414' },
    orange: { main: '#1a140f', sec: '#241c15', inp: '#30251c', acc: '#d4a373', mIn: '#2b2016', mOut: '#b08355' },
    dark: { main: '#000000', sec: '#0a0a0a', inp: '#141414', acc: '#333333', mIn: '#111111', mOut: '#222222' }
};

const authScreen = document.getElementById('auth-screen');
const nameScreen = document.getElementById('name-screen');
const passwordScreen = document.getElementById('password-screen');
const appLayout = document.getElementById('app-layout');
const sidebar = document.getElementById('sidebar');
const mainChat = document.getElementById('mainChat');
const secretInput = document.getElementById('secretInput');
const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');
const passErrorMsg = document.getElementById('passErrorMsg');
const messagesArea = document.getElementById('messages-area');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const clearChatBtn = document.getElementById('clearChatBtn');
const editBar = document.getElementById('edit-bar');
const editPreview = document.getElementById('editPreview');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const contextMenu = document.getElementById('contextMenu');
const ctxEdit = document.getElementById('ctxEdit');
const ctxDelete = document.getElementById('ctxDelete');
const settingsModal = document.getElementById('settingsModal');
const openSettingsBtn = document.getElementById('openSettingsBtn');
const closeSettingsBtn = document.getElementById('closeSettingsBtn');
const colorSwatches = document.querySelectorAll('.color-swatch');
const backToChatsBtn = document.getElementById('backToChatsBtn');
const verifyPasswordBtn = document.getElementById('verifyPasswordBtn');
const loginPasswordInput = document.getElementById('loginPasswordInput');

function applyTheme(themeName) {
    const t = themes[themeName];
    if (!t) return;
    document.documentElement.style.setProperty('--bg-main', t.main);
    document.documentElement.style.setProperty('--bg-secondary', t.sec);
    document.documentElement.style.setProperty('--bg-input', t.inp);
    document.documentElement.style.setProperty('--accent-color', t.acc);
    document.documentElement.style.setProperty('--msg-in', t.mIn);
    document.documentElement.style.setProperty('--msg-out', t.mOut);
    
    colorSwatches.forEach(swatch => {
        swatch.classList.remove('active');
        if (swatch.dataset.theme === themeName) {
            swatch.classList.add('active');
        }
    });
}

const savedTheme = localStorage.getItem('chatTheme');
if (savedTheme) applyTheme(savedTheme);

loginBtn.addEventListener('click', checkAuth);
secretInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkAuth();
});

function checkAuth() {
    const val = secretInput.value.trim();
    if (!val) return;
    
    db.ref("users/" + val).once("value").then(function(snap) {
        if (snap.exists()) {
            tempLoginCode = val;
            expectedPassword = snap.val().password;
            expectedName = snap.val().name;
            isAdmin = !!snap.val().isAdmin;
            authScreen.style.display = "none";
            passwordScreen.style.display = "flex";
        } else {
            db.ref("invites/" + val).once("value").then(function(invSnap) {
                if (invSnap.exists() || val === "RW2501") {
                    tempInviteCode = val;
                    authScreen.style.display = "none";
                    nameScreen.style.display = "flex";
                } else {
                    errorMsg.style.display = "block";
                    secretInput.value = "";
                }
            });
        }
    });
}

verifyPasswordBtn.addEventListener('click', () => {
    const pass = loginPasswordInput.value;
    if (pass === expectedPassword) {
        loginUser(tempLoginCode, expectedName, isAdmin);
    } else {
        passErrorMsg.style.display = "block";
        loginPasswordInput.value = "";
    }
});

loginPasswordInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') verifyPasswordBtn.click();
});

document.getElementById('saveNameBtn').addEventListener('click', () => {
    const nameVal = document.getElementById('nameInput').value.trim();
    const passVal = document.getElementById('newPasswordInput').value.trim();
    if (nameVal === "" || passVal === "") return;
    
    const isNewAdmin = (tempInviteCode === "RW2501");
    
    db.ref("users/" + tempInviteCode).set({
        name: nameVal,
        password: passVal,
        code: tempInviteCode,
        isAdmin: isNewAdmin
    }).then(() => {
        if (!isNewAdmin) {
            db.ref("invites/" + tempInviteCode).remove();
        }
        loginUser(tempInviteCode, nameVal, isNewAdmin);
    });
});

function loginUser(code, name, adminFlag) {
    currentUserCode = code;
    currentUserName = name;
    isAdmin = adminFlag;
    
    db.ref("users/" + code).update({
        name: name,
        code: code
    });
    
    document.getElementById('sidebarName').innerText = name;
    document.getElementById('myCodeDisplay').innerText = "Ваш личный код для приглашения: " + code;
    
    authScreen.style.display = "none";
    nameScreen.style.display = "none";
    passwordScreen.style.display = "none";
    appLayout.style.display = "flex";
    
    if (adminFlag) {
        document.getElementById('adminInviteBtn').style.display = "inline-block";
        document.getElementById('clearChatBtn').style.display = "inline-block";
    }
    
    loadChats();
}

document.getElementById('adminInviteBtn').addEventListener('click', () => {
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    db.ref("invites/" + code).set(true).then(() => {
        alert("Новый код для входа сгенерирован: " + code);
    });
});

document.getElementById('addChatBtn').addEventListener('click', () => {
    const peerCode = prompt("Введите код пользователя для начала чата:");
    if (!peerCode || peerCode === currentUserCode) return;
    
    db.ref("users/" + peerCode).once("value").then(snap => {
        if (snap.exists()) {
            const chatId = [currentUserCode, peerCode].sort().join('_');
            db.ref("user_chats/" + currentUserCode + "/" + chatId).update({ peerCode: peerCode });
            db.ref("user_chats/" + peerCode + "/" + chatId).update({ peerCode: currentUserCode });
            openChat(chatId, snap.val().name, peerCode);
        } else {
            alert("Пользователь с таким кодом не найден.");
        }
    });
});

function loadChats() {
    db.ref("user_chats/" + currentUserCode).on("value", function(snapshot) {
        const chatList = document.getElementById('chatList');
        chatList.innerHTML = "";
        snapshot.forEach(function(childSnapshot) {
            const chatId = childSnapshot.key;
            const peerCode = childSnapshot.val().peerCode;
            
            db.ref("users/" + peerCode).once("value").then(function(userSnap) {
                const peerName = userSnap.val() ? userSnap.val().name : "Неизвестный";
                const div = document.createElement('div');
                div.classList.add('chat-item');
                div.innerHTML = `
                    <div class="avatar">${peerName.charAt(0).toUpperCase()}</div>
                    <div class="chat-info">
                        <h4>${peerName}</h4>
                        <p>Защищенный чат</p>
                    </div>
                `;
                div.addEventListener('click', () => {
                    openChat(chatId, peerName, peerCode);
                });
                chatList.appendChild(div);
            });
        });
    });
}

function openChat(chatId, peerName, peerCode) {
    currentChatId = chatId;
    document.getElementById('noChatSelected').style.display = "none";
    document.getElementById('chatContent').style.display = "flex";
    document.getElementById('chatTitle').innerText = peerName;
    messagesArea.innerHTML = "";
    
    if (window.messagesRef) {
        window.messagesRef.off();
    }
    
    window.messagesRef = db.ref("chats/" + chatId + "/messages");
    
    window.messagesRef.on("child_added", function(snapshot) {
        renderMessage(snapshot.key, snapshot.val());
        scrollToBottom();
    });
    window.messagesRef.on("child_changed", function(snapshot) {
        updateMessageDOM(snapshot.key, snapshot.val());
    });
    window.messagesRef.on("child_removed", function(snapshot) {
        removeMessageDOM(snapshot.key);
    });
    window.messagesRef.on("value", function(snapshot) {
        if (!snapshot.exists()) {
            messagesArea.innerHTML = "";
        }
    });
    
    if (window.innerWidth <= 768) {
        sidebar.classList.add('hidden');
        mainChat.classList.add('active');
    }
}

backToChatsBtn.addEventListener('click', () => {
    sidebar.classList.remove('hidden');
    mainChat.classList.remove('active');
    currentChatId = null;
});

sendBtn.addEventListener('click', handleSend);
msgInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleSend();
});

function handleSend() {
    if (!currentChatId) return;
    const text = msgInput.value.trim();
    if (text === "") return;
    
    if (editingMessageId) {
        db.ref("chats/" + currentChatId + "/messages/" + editingMessageId).update({
            text: text,
            edited: true
        });
        cancelEdit();
    } else {
        const msgData = {
            senderCode: currentUserCode,
            senderName: currentUserName,
            text: text,
            timestamp: Date.now(),
            edited: false
        };
        db.ref("chats/" + currentChatId + "/messages").push(msgData);
    }
    msgInput.value = "";
}

clearChatBtn.addEventListener('click', () => {
    if (!currentChatId) return;
    if (confirm("Удалить историю этого чата? Действие необратимо.")) {
        db.ref("chats/" + currentChatId + "/messages").remove();
    }
});

function renderMessage(key, data) {
    const isOut = data.senderCode === currentUserCode;
    const wrapper = document.createElement('div');
    wrapper.classList.add('message-wrapper');
    wrapper.classList.add(isOut ? 'out' : 'in');
    wrapper.id = "msg-" + key;
    wrapper.dataset.key = key;
    wrapper.dataset.sender = data.senderCode;
    
    const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    let editedMark = data.edited ? "изм. " : "";
    
    let senderNameHTML = "";
    if (!isOut) senderNameHTML = `<div class="message-sender">${data.senderName}</div>`;
    
    wrapper.innerHTML = `
        <div class="message-bubble">
            ${senderNameHTML}
            <div class="message-text">${data.text}</div>
            <div class="message-meta">${editedMark}${time}</div>
        </div>
    `;
    
    const bubble = wrapper.querySelector('.message-bubble');
    bubble.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        showContextMenu(e, key, wrapper);
    });
    bubble.addEventListener('click', function(e) {
        showContextMenu(e, key, wrapper);
    });
    
    messagesArea.appendChild(wrapper);
}

function updateMessageDOM(key, data) {
    const wrapper = document.getElementById("msg-" + key);
    if (wrapper) {
        wrapper.querySelector('.message-text').innerText = data.text;
        const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        wrapper.querySelector('.message-meta').innerText = "изм. " + time;
    }
}

function removeMessageDOM(key) {
    const wrapper = document.getElementById("msg-" + key);
    if (wrapper) wrapper.remove();
}

function scrollToBottom() {
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showContextMenu(e, key, element) {
    const sender = element.dataset.sender;
    if (!isAdmin && sender !== currentUserCode) {
        contextMenu.style.display = "none";
        return;
    }
    
    selectedMessageId = key;
    selectedMessageElement = element;
    contextMenu.style.display = "block";
    
    const menuWidth = contextMenu.offsetWidth;
    const menuHeight = contextMenu.offsetHeight;
    const winWidth = window.innerWidth;
    const winHeight = window.innerHeight;
    
    let left = e.clientX;
    let top = e.clientY;
    
    if (left + menuWidth > winWidth) left = winWidth - menuWidth - 10;
    if (top + menuHeight > winHeight) top = winHeight - menuHeight - 10;
    
    contextMenu.style.left = left + "px";
    contextMenu.style.top = top + "px";
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.message-bubble') && !e.target.closest('.context-menu')) {
        contextMenu.style.display = "none";
    }
});

ctxEdit.addEventListener('click', function() {
    contextMenu.style.display = "none";
    if (selectedMessageElement) {
        const text = selectedMessageElement.querySelector('.message-text').innerText;
        msgInput.value = text;
        editingMessageId = selectedMessageId;
        editBar.style.display = "flex";
        editPreview.innerText = text;
        msgInput.focus();
    }
});

ctxDelete.addEventListener('click', function() {
    contextMenu.style.display = "none";
    if (selectedMessageId && currentChatId) {
        if (confirm("Удалить сообщение?")) {
            db.ref("chats/" + currentChatId + "/messages/" + selectedMessageId).remove();
            if (editingMessageId === selectedMessageId) cancelEdit();
        }
    }
});

cancelEditBtn.addEventListener('click', cancelEdit);

function cancelEdit() {
    editingMessageId = null;
    editBar.style.display = "none";
    msgInput.value = "";
}

openSettingsBtn.addEventListener('click', () => settingsModal.style.display = "flex");
closeSettingsBtn.addEventListener('click', () => settingsModal.style.display = "none");

colorSwatches.forEach(swatch => {
    swatch.addEventListener('click', function() {
        const theme = this.dataset.theme;
        applyTheme(theme);
        localStorage.setItem('chatTheme', theme);
    });
});
</script>
</body>
</html>
